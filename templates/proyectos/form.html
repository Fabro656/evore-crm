{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}{% block page_title %}{{ titulo }}{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('proyectos_index') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Proyectos</a>{% endblock %}
{% block content %}
<div style="max-width:700px;margin:0 auto">
<div class="fc"><form method="POST" novalidate>
  <div class="row g-3">
    <div class="col-12"><label class="form-label">Nombre del proyecto *</label>
      <input type="text" name="nombre" class="form-control" value="{{ obj.nombre if obj else '' }}" required placeholder="Ej: Lanzamiento linea organica"></div>
    <div class="col-12"><label class="form-label">Descripcion</label>
      <textarea name="descripcion" class="form-control" rows="3" placeholder="Objetivo y alcance del proyecto...">{{ obj.descripcion if obj else '' }}</textarea></div>
    {% if obj and estados is defined %}
    <div class="col-md-4"><label class="form-label">Estado</label>
      <select name="estado" class="form-select">
        {% for e in estados %}<option value="{{ e }}" {% if obj.estado==e %}selected{% endif %}>{{ e.replace('_',' ').title() }}</option>{% endfor %}
      </select></div>
    {% endif %}
    <div class="col-md-4"><label class="form-label">Prioridad</label>
      <select name="prioridad" class="form-select">
        {% for p in ['baja','media','alta'] %}<option value="{{ p }}" {% if obj and obj.prioridad==p %}selected{% endif %}>{{ p.title() }}</option>{% endfor %}
      </select></div>
    <div class="col-md-4"><label class="form-label">Color</label>
      <input type="color" name="color" class="form-control form-control-color" value="{{ obj.color if obj else '#0176D3' }}"></div>
    <div class="col-md-4"><label class="form-label">Fecha inicio</label>
      <input type="date" name="fecha_inicio" class="form-control" value="{{ obj.fecha_inicio.strftime('%Y-%m-%d') if obj and obj.fecha_inicio else '' }}"></div>
    <div class="col-md-4"><label class="form-label">Fecha fin</label>
      <input type="date" name="fecha_fin" class="form-control" value="{{ obj.fecha_fin.strftime('%Y-%m-%d') if obj and obj.fecha_fin else '' }}"></div>
    <div class="col-md-4"><label class="form-label">Presupuesto</label>
      <div class="input-group"><span class="input-group-text">$</span>
        <input type="number" name="presupuesto" class="form-control" step="1" value="{{ obj.presupuesto|int if obj else 0 }}"></div></div>
    <div class="col-md-6"><label class="form-label">Responsable</label>
      <select name="responsable_id" class="form-select">
        <option value="">— Yo —</option>
        {% for u in usuarios %}<option value="{{ u.id }}" {% if obj and obj.responsable_id==u.id %}selected{% endif %}>{{ u.nombre }}</option>{% endfor %}
      </select></div>
    <div class="col-md-6"><label class="form-label">Cliente vinculado</label>
      <select name="cliente_id" class="form-select">
        <option value="">— Sin cliente —</option>
        {% for c in clientes %}<option value="{{ c.id }}" {% if obj and obj.cliente_id==c.id %}selected{% endif %}>{{ c.empresa or c.nombre }}</option>{% endfor %}
      </select></div>
  </div>
  <div class="d-flex gap-2 mt-4">
    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ 'Actualizar' if obj else 'Crear Proyecto' }}</button>
    <a href="{{ url_for('proyectos_index') }}" class="btn btn-outline-secondary">Cancelar</a>
  </div>
</form></div>
</div>
{% endblock %}
