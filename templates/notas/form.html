{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}{% block page_title %}{{ titulo }}{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('notas') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver</a>{% endblock %}
{% block content %}<div class="fc"><form method="POST"><div class="row g-3">
  <div class="col-md-6"><label class="form-label">Titulo</label>
    <input type="text" name="titulo" class="form-control" placeholder="Titulo de la nota" value="{{ obj.titulo if obj else '' }}"></div>
  <div class="col-md-3"><label class="form-label">Tipo</label>
    <select name="tipo_nota" class="form-select">
      {% for t,l in [('nota','Nota'),('alerta','Alerta'),('seguimiento','Seguimiento'),('resolucion','Resolucion')] %}
      <option value="{{ t }}" {% if obj and obj.tipo_nota==t %}selected{% endif %}>{{ l }}</option>{% endfor %}
    </select></div>
  <div class="col-md-3"><label class="form-label">Prioridad</label>
    <select name="prioridad" class="form-select">
      {% for p,l in [('baja','Baja'),('normal','Normal'),('alta','Alta')] %}
      <option value="{{ p }}" {% if obj and obj.prioridad==p %}selected{% elif not obj and p=='normal' %}selected{% endif %}>{{ l }}</option>{% endfor %}
    </select></div>

  <div class="col-12"><label class="form-label fw-bold">Vincular a (opcional)</label></div>
  <div class="col-md-4"><label class="form-label">Orden de compra</label>
    <select name="orden_compra_id" class="form-select">
      <option value="">-- Ninguna --</option>
      {% for oc in ocs_list %}<option value="{{ oc.id }}" {% if (obj and obj.orden_compra_id==oc.id) or (pre_oc and pre_oc==oc.id) %}selected{% endif %}>{{ oc.numero }} — {{ oc.proveedor.empresa if oc.proveedor else '' }}</option>{% endfor %}
    </select></div>
  <div class="col-md-4"><label class="form-label">Venta</label>
    <select name="venta_id" class="form-select">
      <option value="">-- Ninguna --</option>
      {% for v in ventas_list %}<option value="{{ v.id }}" {% if (obj and obj.venta_id==v.id) or (pre_venta and pre_venta==v.id) %}selected{% endif %}>{{ v.numero }} — {{ v.titulo[:30] }}</option>{% endfor %}
    </select></div>
  <div class="col-md-4"><label class="form-label">Proveedor</label>
    <select name="proveedor_id" class="form-select">
      <option value="">-- Ninguno --</option>
      {% for p in proveedores_list %}<option value="{{ p.id }}" {% if obj and obj.proveedor_id==p.id %}selected{% endif %}>{{ p.empresa or p.nombre }}</option>{% endfor %}
    </select></div>
  <div class="col-md-4"><label class="form-label">Cliente</label>
    <select name="cliente_id" class="form-select">
      <option value="">-- Ninguno --</option>
      {% for c in clientes_list %}<option value="{{ c.id }}" {% if obj and obj.cliente_id==c.id %}selected{% endif %}>{{ c.empresa or c.nombre }}</option>{% endfor %}
    </select></div>
  <div class="col-md-4"><label class="form-label">Modulo</label>
    <select name="modulo" class="form-select">
      <option value="">-- Ninguno --</option>
      {% for m in ['Ventas','Cotizaciones','Produccion','Inventario','Gastos','Tickets','Compras','Otro'] %}
      <option value="{{ m }}" {% if obj and obj.modulo==m %}selected{% endif %}>{{ m }}</option>{% endfor %}
    </select></div>
  <div class="col-md-4"><label class="form-label">Fecha de revision</label>
    <input type="date" name="fecha_revision" class="form-control"
      value="{{ obj.fecha_revision.strftime('%Y-%m-%d') if obj and obj.fecha_revision else '' }}"></div>

  {% if obj %}
  <div class="col-md-4"><label class="form-label">Estado</label>
    <select name="estado_nota" class="form-select">
      <option value="abierta" {% if obj.estado_nota=='abierta' %}selected{% endif %}>Abierta</option>
      <option value="resuelta" {% if obj.estado_nota=='resuelta' %}selected{% endif %}>Resuelta</option>
    </select></div>
  {% endif %}

  <div class="col-12"><label class="form-label">Contenido *</label>
    <textarea name="contenido" class="form-control" rows="8" style="font-size:.9rem" required>{{ obj.contenido if obj else '' }}</textarea></div>
</div>
<div class="d-flex gap-2 mt-4">
  <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{{ 'Actualizar' if obj else 'Guardar nota' }}</button>
  <a href="{{ url_for('notas') }}" class="btn btn-outline-secondary">Cancelar</a>
</div></form></div>
{% endblock %}
