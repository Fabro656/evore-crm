{% extends 'base.html' %}
{% block title %}Pagina no encontrada{% endblock %}
{% block page_title %}404{% endblock %}
{% block content %}
<div class="text-center py-5" style="max-width:var(--content-sm);margin:0 auto">
  <img src="/static/img/error-mascot.png" alt="Evore - pagina no encontrada" style="max-width:200px;opacity:.85;margin-bottom:1.5rem">
  <h4 class="fw-bold mb-2">Pagina no encontrada</h4>
  <p class="text-muted mb-4" style="font-size:.92rem">La pagina que buscas no existe, fue movida o no tienes permisos para verla.</p>
  <div class="d-flex gap-2 justify-content-center">
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary"><i class="bi bi-house me-1"></i>Ir al inicio</a>
    <button onclick="history.back()" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Volver</button>
  </div>
</div>
{% endblock %}
