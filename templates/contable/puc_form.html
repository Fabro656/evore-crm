{% extends 'base.html' %}
{% block title %}Nueva cuenta PUC{% endblock %}{% block page_title %}Agregar cuenta al PUC{% endblock %}
{% block content %}
<div class="fc">
  <form method="POST">
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Codigo*</label>
        <input type="text" name="codigo" class="form-control" required placeholder="Ej: 513540" maxlength="10">
        <small style="color:var(--text2)">Debe seguir la estructura del catalogo contable</small>
      </div>
      <div class="col-md-8">
        <label class="form-label">Nombre*</label>
        <input type="text" name="nombre" class="form-control" required placeholder="Nombre de la cuenta">
      </div>
      <div class="col-md-6">
        <label class="form-label">Cuenta padre</label>
        <select name="padre_codigo" class="form-select">
          <option value="">— Sin padre —</option>
          {% for p in padres %}<option value="{{ p.codigo }}">{{ p.codigo }} — {{ p.nombre }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Naturaleza</label>
        <select name="naturaleza" class="form-select">
          <option value="debito">Debito</option>
          <option value="credito">Credito</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Tipo</label>
        <select name="tipo" class="form-select">
          <option value="activo">Activo</option>
          <option value="pasivo">Pasivo</option>
          <option value="patrimonio">Patrimonio</option>
          <option value="ingreso">Ingreso</option>
          <option value="gasto" selected>Gasto</option>
          <option value="costo_venta">Costo de venta</option>
          <option value="costo_produccion">Costo de produccion</option>
        </select>
      </div>
      <div class="col-12">
        <label class="form-label">Descripcion (opcional)</label>
        <textarea name="descripcion" class="form-control" rows="2"></textarea>
      </div>
      <div class="col-12">
        <button class="btn btn-primary">Guardar cuenta</button>
        <a href="{{ url_for('contable_puc') }}" class="btn btn-ghost ms-2">Cancelar</a>
      </div>
    </div>
  </form>
</div>
{% endblock %}
