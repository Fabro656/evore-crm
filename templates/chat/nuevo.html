{% extends 'base.html' %}
{% block title %}Nuevo Chat{% endblock %}{% block page_title %}Nueva Conversacion{% endblock %}
{% block topbar_actions %}<a href="{{ url_for('chat_index') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>Chats</a>{% endblock %}
{% block content %}
<div class="fc" style="max-width:var(--content-md);width:100%">
<form method="POST">
  <div class="mb-3">
    <label class="form-label">Nombre del chat <small class="text-muted">(opcional)</small></label>
    <input type="text" name="nombre" class="form-control" placeholder="Ej: Equipo ventas, Proyecto X...">
  </div>
  <div class="mb-3">
    <label class="form-label">Participantes <span class="req">*</span></label>
    <div style="max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);padding:var(--sp-2)">
      {% for u in users %}
      <label class="d-flex align-items-center gap-2 p-2" style="cursor:pointer;border-radius:6px;transition:background .1s">
        <input type="checkbox" name="users" value="{{ u.id }}" class="form-check-input">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0">{{ u.nombre[0].upper() }}</div>
        <div>
          <div style="font-size:var(--font-body);font-weight:600">{{ u.nombre }}</div>
          <div style="font-size:var(--font-caption);color:var(--text2)">{{ u.email }}</div>
        </div>
      </label>
      {% endfor %}
    </div>
  </div>
  <button type="submit" class="btn btn-primary"><i class="bi bi-chat-dots me-1"></i>Crear conversacion</button>
</form>
</div>
{% endblock %}
