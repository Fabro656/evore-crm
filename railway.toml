[build]
builder = "dockerfile"

[deploy]
startCommand = "gunicorn --bind 0.0.0.0:8000 --workers 2 --timeout 60 app:app"

[environments.production]
variables = {
  PYTHONUNBUFFERED = "1",
  FLASK_ENV = "production",
  RAILWAY_ENVIRONMENT = "production"
}

[environments.development]
variables = {
  PYTHONUNBUFFERED = "1",
  FLASK_ENV = "development",
  FLASK_DEBUG = "1"
}
