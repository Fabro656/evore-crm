version: '3.8'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: evore
      POSTGRES_USER: evore
      POSTGRES_PASSWORD: evore_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:

# Usage:
#   docker compose up -d
#   export DATABASE_URL=postgresql://evore:evore_dev@localhost:5432/evore
#   python app.py
